ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.vialreport.backend.ApplicationKt.module ]
    }
}

mongodb {
    uri = ${?MONGODB_URI}
}

jwt {
    secret   = ${?JWT_SECRET}
    issuer   = ${?JWT_ISSUER}
    audience = ${?JWT_AUDIENCE}
    realm    = "VialReport"
}
